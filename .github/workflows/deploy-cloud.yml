name: Deploy Cloud

on:
  push:
    branches: [main]
    paths:
      - "packages/cloud/**"

concurrency:
  group: deploy-cloud-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx turbo run test --filter=@kindlm/cloud

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply D1 migrations (staging)
        run: npx wrangler d1 migrations apply kindlm-staging --env staging
        working-directory: packages/cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Deploy to staging
        run: npx wrangler deploy --env staging
        working-directory: packages/cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  smoke-test:
    needs: deploy-staging
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging-api.kindlm.com/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi
      - name: Auth check (expect 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://staging-api.kindlm.com/v1/auth/tokens)
          if [ "$STATUS" != "401" ]; then
            echo "Auth check failed: expected 401, got $STATUS"
            exit 1
          fi

  deploy-production:
    needs: smoke-test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply D1 migrations (production)
        run: npx wrangler d1 migrations apply kindlm-prod
        working-directory: packages/cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      - name: Deploy to production
        run: npx wrangler deploy
        working-directory: packages/cloud
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
