name: Deploy Dashboard
on:
  push:
    branches: [main]
    paths: ["packages/dashboard/**"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: npx turbo run build --filter=@kindlm/dashboard
        env:
          NEXT_PUBLIC_API_URL: https://api.kindlm.com
      - name: Deploy to Cloudflare
        run: npx wrangler pages deploy packages/dashboard/out --project-name=kindlm-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
