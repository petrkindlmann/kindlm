name: Deploy Site
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/deploy-site.yml"]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: cd site && npm ci && npm run build
      - name: Deploy to Cloudflare Pages
        run: cd site && npx wrangler pages deploy out --project-name=kindlm-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 7285672ab997538a962589aae6d1bac8
