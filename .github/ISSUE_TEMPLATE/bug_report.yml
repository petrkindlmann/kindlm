name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `kindlm test`, I get..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected KindLM to..."
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config (kindlm.yaml)
      description: Paste relevant parts of your config. Redact API keys.
      render: yaml

  - type: textarea
    id: output
    attributes:
      label: CLI output
      description: Paste the error output. Run with `--reporter json` for full details.
      render: text

  - type: input
    id: version
    attributes:
      label: KindLM version
      description: Run `kindlm --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - CI (GitHub Actions)
        - CI (GitLab)
        - Other
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "20.11.0"
