# Example: .github/workflows/kindlm.yml
name: KindLM Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: petrkindlmann/kindlm@main
        with:
          config: kindlm.yaml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
