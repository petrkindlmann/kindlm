name = "kindlm-api"
main = "src/index.ts"
compatibility_date = "2026-02-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "api.kindlm.com/*", zone_name = "kindlm.com" }
]

[triggers]
crons = ["0 2 * * *"]  # Daily retention cleanup at 02:00 UTC

[[d1_databases]]
binding = "DB"
database_name = "kindlm-prod"
database_id = "7fcb217f-d830-4199-955b-a6341bc79fff"

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# GITHUB_CLIENT_ID         (required)
# GITHUB_CLIENT_SECRET     (required)
# SIGNING_KEY_SECRET       (required — envelope encryption for auth codes)
# STRIPE_SECRET_KEY        (Phase 3)
# STRIPE_WEBHOOK_SECRET    (Phase 3)

# ── Staging environment ──

[env.staging]
name = "kindlm-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "kindlm-staging"
database_id = "8f1a40fe-1d79-400c-91c5-5b28fb60638d"

[env.staging.vars]
ENVIRONMENT = "staging"
